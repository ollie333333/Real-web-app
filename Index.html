```html
<!DOCTYPE html>
<html>
<head>
<title>Good Luck Generator</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
    margin-top:30vh;
}
button{
    font-size:28px;
    padding:15px 30px;
}
</style>
</head>
<body>

<h1>🍀 Good Luck Generator 🍀</h1>

<button id="startBtn">Tap for Good Luck</button>

<audio id="drum" src="drumroll.mp3"></audio>
<audio id="rick" src="rickroll.mp3"></audio>

<script>
const startBtn = document.getElementById("startBtn");
const drum = document.getElementById("drum");
const rick = document.getElementById("rick");

startBtn.onclick = async () => {
    startBtn.style.display = "none";
    await drum.play();

    drum.onended = () => {
        document.body.innerHTML = `
            <h1>🍀 Your Good Luck Is Ready!</h1>
            <button id="claimBtn">🎁 Claim Your Good Luck</button>
        `;

        document.getElementById("claimBtn").onclick = () => {
            document.body.innerHTML =
                "<h1>🎉 YOU GOT RICKROLLED 🎉</h1>";

            rick.play();
        };
    };
};
</script>

</body>
</html>
```
