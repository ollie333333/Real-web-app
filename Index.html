```html
<!DOCTYPE html>
<html>
<head>
<title>Good Luck Generator</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin-top:30vh;
}
button{
    font-size:32px;
    padding:20px 40px;
}
</style>
</head>
<body>

<h1>🍀 Good Luck Generator 🍀</h1>

<button id="playBtn">Tap for Good Luck</button>

<audio id="drum" preload="auto">
    <source src="drumroll.mp3" type="audio/mpeg">
</audio>

<audio id="rick" preload="auto">
    <source src="rickroll.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("playBtn");
const drum = document.getElementById("drum");
const rick = document.getElementById("rick");

btn.addEventListener("click", async () => {
    btn.style.display = "none";

    try {
        await drum.play();

        drum.addEventListener("ended", () => {
            document.body.innerHTML =
                "<h1>🎉 YOU GOT RICKROLLED 🎉</h1>";

            rick.play();
        }, { once: true });

    } catch (err) {
        alert("Audio failed to play.");
    }
});
</script>

</body>
</html>
```
